<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Background gradient -->
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#2c3e50"/>
			<stop offset="100%" stop-color="#0f2027"/>
		</linearGradient>

		<!-- Red gradient -->
		<linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#ff3b3b"/>
			<stop offset="100%" stop-color="#b30000"/>
		</linearGradient>

		<!-- Text gradient -->
		<linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#ffffff"/>
			<stop offset="100%" stop-color="#c0c0c0"/>
		</linearGradient>

		<!-- Shadow -->
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
		</filter>
	</defs>

	<!-- Rounded background -->
	<rect x="0" y="0" width="512" height="512" rx="60" fill="url(#bg)"/>

	<!-- Stylized Cubase-like shape -->
	<g filter="url(#shadow)">
		<!-- Curved shape -->
		<path d="M190 120 
             Q300 120 340 230 
             Q300 340 190 340 
             L150 300 
             Q220 300 260 230 
             Q220 160 150 160 Z"
			  fill="url(#red)"/>

		<!-- Circle -->
		<circle cx="320" cy="250" r="45" fill="url(#red)"/>
	</g>

	<!-- Text -->
	<text x="50%" y="430" text-anchor="middle"
		  font-family="Arial, Helvetica, sans-serif"
		  font-size="90"
		  font-weight="bold"
		  fill="url(#textGrad)">
		MACRO
	</text>
</svg>